name: Bug Report
description: Quickly report a reproducible problem
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe what happened and what seems incorrect.
      placeholder: "Example: After returning to chat, the message list jumps to an earlier position."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Minimal Reproduction Steps (Optional)
      description: Provide the shortest ordered steps to reproduce.
      placeholder: |
        1. Open page xx
        2. Perform action xx
        3. Observe behavior xx

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots / Environment (Optional)
      description: Paste key logs, screenshots, or environment details (please remove sensitive data).
