name: 缺陷报告
description: 报告一个可复现的问题
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈问题。请尽量提供可复现信息，便于快速定位。

  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      description: 简要说明出现了什么问题。
      placeholder: 例如：调用 /api/v1/auth/refresh 在 iOS Web 下偶发 401。
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请按顺序给出最小复现路径。
      placeholder: |
        1. 使用账号 A 登录
        2. 打开 Sessions 页面
        3. 点击 Continue
        4. 观察报错
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      placeholder: 应进入会话并拉取历史消息。
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      placeholder: 页面提示 "Session continuation failed"。
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: 环境信息
      description: 操作系统、浏览器/设备、部署方式、分支或提交号。
      placeholder: |
        - OS: macOS 14
        - Browser: Chrome 121
        - App: Web
        - Commit: abcdef1
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 日志或截图
      description: 请粘贴关键日志片段（注意脱敏）。
