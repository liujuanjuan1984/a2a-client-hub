name: Feature Request
description: Quickly submit a feature request or improvement proposal
labels:
  - enhancement
body:
  - type: textarea
    id: background
    attributes:
      label: Problem Background
      description: What pain point exists and what problem should be solved?
      placeholder: "Example: Admins cannot bulk import the Hub A2A catalog."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution / Acceptance Criteria
      description: Describe the expected approach or verifiable completion criteria.
      placeholder: |
        Example:
        - Support CSV batch import
        - Return line number and reason for failed rows
        - Show import results in the UI
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional Context (Optional)
      description: Add related links, mockups, API examples, or constraints.
