name: Feature Request
description: Propose a new capability or improvement
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the proposal. Please describe user value and clear acceptance criteria.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What pain point are you trying to solve?
      placeholder: "Example: Admins cannot bulk import the Hub A2A catalog."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: How should this be improved?
      placeholder: "Example: Add CSV import with a pre-validation endpoint."
    validations:
      required: true

  - type: textarea
    id: value
    attributes:
      label: User/Business Value
      description: What value does this change deliver?
      placeholder: "Example: Reduce catalog maintenance cost and manual configuration errors."
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Define verifiable completion criteria.
      placeholder: |
        - Supports batch import of 100 records
        - Failed rows return line number and reason
        - Backend and frontend tests are included
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional Context
      description: Related links, mockups, API examples, or other context.
