version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
    groups:
      backend-all-updates:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
    groups:
      frontend-all-updates:
        patterns:
          - "*"
