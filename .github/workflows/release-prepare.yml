name: Create Release Preparation PR

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the leading v prefix."
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare-release:
    name: Create release preparation draft pull request
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve requested release version
        id: version
        run: |
          RAW_VERSION="${{ inputs.version }}"
          RELEASE_VERSION="${RAW_VERSION#v}"
          TAG_NAME="v$RELEASE_VERSION"

          if git ls-remote --exit-code --refs --tags origin "refs/tags/$TAG_NAME" >/dev/null 2>&1; then
            echo "::error::Tag $TAG_NAME already exists on origin."
            exit 1
          fi

          echo "version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Sync release version metadata
        run: |
          python3 scripts/sync_release_version.py --version "${{ steps.version.outputs.version }}" --write
          python3 scripts/sync_release_version.py --version "${{ steps.version.outputs.version }}" --check

          if git diff --quiet VERSION backend/pyproject.toml backend/uv.lock frontend/package.json frontend/app.json frontend/package-lock.json; then
            echo "::error::Repository metadata already matches version ${{ steps.version.outputs.version }}. No release preparation PR was created."
            exit 1
          fi

      - name: Create version sync pull request
        uses: peter-evans/create-pull-request@v8
        with:
          title: "chore(release): sync version metadata for ${{ steps.version.outputs.version }} (#586)"
          body: |
            ## 变更说明
            本 PR 由发布准备流水线自动发起，用于将仓库内版本元数据同步为目标发布版本。

            ### 来源
            - 目标标签: `${{ steps.version.outputs.tag }}`
            - 目标版本: `${{ steps.version.outputs.version }}`
            - 自动化: `.github/workflows/release-prepare.yml`

            ### 同步文件
            - `VERSION`
            - `backend/pyproject.toml`
            - `backend/uv.lock`
            - `frontend/package.json`
            - `frontend/app.json`
            - `frontend/package-lock.json`

            ### 后续发布
            - 合并本 PR 到 `master`
            - `.github/workflows/release.yml` 将从合并后的主干提交创建标签和 GitHub Release

            ### 关联
            - Tracking: #586
          branch: "release/version-${{ steps.version.outputs.version }}"
          base: master
          commit-message: "chore(release): sync version metadata for ${{ steps.version.outputs.version }} (#586)"
          delete-branch: true
          draft: true
          add-paths: |
            VERSION
            backend/pyproject.toml
            backend/uv.lock
            frontend/package.json
            frontend/app.json
            frontend/package-lock.json
