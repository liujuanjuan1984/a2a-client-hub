name: Dependency Audit (Dev)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  backend-dev-dependency-audit:
    name: Backend Dev Dependency Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Install backend dependencies
        run: uv sync --extra dev --locked

      - name: Run backend dev dependency audit
        run: |
          set +e
          uv run pip-audit --format markdown --output /tmp/backend-dev-pip-audit.md
          audit_exit=$?
          set -e

          {
            echo "## Backend dev dependency audit"
            echo
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$audit_exit" -eq 0 ]; then
            echo "No known vulnerabilities found in backend development dependencies." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "::warning title=Backend dev dependency audit::Known vulnerabilities were found in backend development dependencies. Review the job summary and uploaded report."
          echo "Known vulnerabilities were found in backend development dependencies." >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"
          if [ -f /tmp/backend-dev-pip-audit.md ]; then
            cat /tmp/backend-dev-pip-audit.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "pip-audit exited with code ${audit_exit} before writing a markdown report." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload backend dev dependency audit report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: backend-dev-pip-audit
          path: /tmp/backend-dev-pip-audit.md
          if-no-files-found: ignore
