name: Publish GitHub Release

on:
  push:
    branches:
      - master
    paths:
      - VERSION
      - backend/pyproject.toml
      - backend/uv.lock
      - frontend/package.json
      - frontend/app.json
      - frontend/package-lock.json
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to reconcile, for example v1.3.2."
        required: true
        type: string

permissions:
  contents: write

jobs:
  github-release:
    name: Ensure release tag and GitHub Release
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve release target
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW_TAG="${{ inputs.tag }}"
            TAG_NAME="${RAW_TAG#refs/tags/}"
            TAG_NAME="${TAG_NAME#v}"
            TAG_NAME="v$TAG_NAME"

            if ! git ls-remote --exit-code --refs --tags origin "refs/tags/$TAG_NAME" >/dev/null 2>&1; then
              echo "::error::Tag $TAG_NAME does not exist on origin. Manual reconciliation only supports existing release tags."
              exit 1
            fi

            TARGET_COMMIT="$(git rev-list -n 1 "$TAG_NAME" 2>/dev/null || true)"
            if [ -z "$TARGET_COMMIT" ]; then
              echo "::error::Failed to resolve commit for tag $TAG_NAME."
              exit 1
            fi

            git checkout --detach "$TARGET_COMMIT"
            RELEASE_VERSION="${TAG_NAME#v}"
          else
            RELEASE_VERSION="$(sed -n '1{s/[[:space:]]*$//;p;q}' VERSION)"
            TAG_NAME="v$RELEASE_VERSION"
            TARGET_COMMIT="${GITHUB_SHA}"
          fi

          if [ -z "$RELEASE_VERSION" ]; then
            echo "::error::VERSION is empty."
            exit 1
          fi

          python3 scripts/sync_release_version.py --version "$RELEASE_VERSION" --check

          echo "version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "target_commit=$TARGET_COMMIT" >> "$GITHUB_OUTPUT"

      - name: Require a VERSION change in the pushed range
        id: range
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual reconciliation requested for ${{ steps.target.outputs.tag }}."
            echo "publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BEFORE_SHA="${{ github.event.before }}"
          if [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --quiet "$BEFORE_SHA" "${GITHUB_SHA}" -- VERSION; then
            echo "No VERSION change detected in the pushed range. Skipping release."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve tag state
        if: steps.range.outputs.publish == 'true'
        id: tag
        run: |
          TAG_NAME="${{ steps.target.outputs.tag }}"
          TARGET_COMMIT="${{ steps.target.outputs.target_commit }}"
          LOCAL_SHA="$(git rev-list -n 1 "$TAG_NAME" 2>/dev/null || true)"
          REMOTE_SHA="$(git ls-remote --tags origin "refs/tags/$TAG_NAME^{}" | awk 'NR==1 {print $1}')"
          if [ -z "$REMOTE_SHA" ]; then
            REMOTE_SHA="$(git ls-remote --refs --tags origin "refs/tags/$TAG_NAME" | awk 'NR==1 {print $1}')"
          fi

          if [ -n "$LOCAL_SHA" ] || [ -n "$REMOTE_SHA" ]; then
            EXISTING_SHA="$REMOTE_SHA"
            if [ -z "$EXISTING_SHA" ]; then
              EXISTING_SHA="$LOCAL_SHA"
            fi

            if [ "$EXISTING_SHA" = "$TARGET_COMMIT" ]; then
              echo "Tag $TAG_NAME already points to $TARGET_COMMIT. Reusing it for release publication."
              echo "create_tag=false" >> "$GITHUB_OUTPUT"
              echo "publish_release=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "::error::Tag $TAG_NAME already exists at $EXISTING_SHA, expected $TARGET_COMMIT."
            exit 1
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "::error::Tag $TAG_NAME is missing. Manual reconciliation only recreates a GitHub Release for an existing tag."
            exit 1
          fi

          echo "create_tag=true" >> "$GITHUB_OUTPUT"
          echo "publish_release=true" >> "$GITHUB_OUTPUT"

      - name: Create and push release tag
        if: steps.range.outputs.publish == 'true' && steps.tag.outputs.create_tag == 'true'
        run: |
          TAG_NAME="${{ steps.target.outputs.tag }}"
          TARGET_COMMIT="${{ steps.target.outputs.target_commit }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG_NAME" "$TARGET_COMMIT" -m "Release $TAG_NAME"
          git push origin "refs/tags/$TAG_NAME"

      - name: Ensure GitHub Release exists
        if: steps.range.outputs.publish == 'true' && steps.tag.outputs.publish_release == 'true'
        run: |
          TAG_NAME="${{ steps.target.outputs.tag }}"
          RELEASE_VERSION="${{ steps.target.outputs.version }}"
          TARGET_COMMIT="${{ steps.target.outputs.target_commit }}"

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "GitHub Release for $TAG_NAME already exists. Nothing to reconcile."
            exit 0
          fi

          NOTES_FILE="$(mktemp)"
          cat > "$NOTES_FILE" <<EOF
          Release version: **$RELEASE_VERSION**
          Release source: master/tag commit \`$TARGET_COMMIT\`
          EOF

          ATTEMPT=1
          MAX_ATTEMPTS=3
          while [ "$ATTEMPT" -le "$MAX_ATTEMPTS" ]; do
            if gh release create "$TAG_NAME" \
              --verify-tag \
              --generate-notes \
              --title "Release $TAG_NAME" \
              --notes-file "$NOTES_FILE"; then
              echo "GitHub Release for $TAG_NAME created on attempt $ATTEMPT."
              exit 0
            fi

            if gh release view "$TAG_NAME" >/dev/null 2>&1; then
              echo "GitHub Release for $TAG_NAME became visible after attempt $ATTEMPT."
              exit 0
            fi

            if [ "$ATTEMPT" -eq "$MAX_ATTEMPTS" ]; then
              break
            fi

            echo "Release creation attempt $ATTEMPT failed. Retrying after backoff."
            sleep $((ATTEMPT * 10))
            ATTEMPT=$((ATTEMPT + 1))
          done

          echo "::error::Failed to ensure GitHub Release for $TAG_NAME after $MAX_ATTEMPTS attempts."
          exit 1
