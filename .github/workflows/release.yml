name: Release

on:
  push:
    branches:
      - master
    paths:
      - VERSION
      - backend/pyproject.toml
      - backend/uv.lock
      - frontend/package.json
      - frontend/app.json
      - frontend/package-lock.json

permissions:
  contents: write

jobs:
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version from repository metadata
        id: version
        run: |
          RELEASE_VERSION="$(sed -n '1{s/[[:space:]]*$//;p;q}' VERSION)"
          if [ -z "$RELEASE_VERSION" ]; then
            echo "::error::VERSION is empty."
            exit 1
          fi

          python3 scripts/sync_release_version.py --version "$RELEASE_VERSION" --check

          echo "version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$RELEASE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Require a VERSION change in the pushed range
        id: range
        run: |
          BEFORE_SHA="${{ github.event.before }}"
          if [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --quiet "$BEFORE_SHA" "${GITHUB_SHA}" -- VERSION; then
            echo "No VERSION change detected in the pushed range. Skipping release."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate tag availability
        if: steps.range.outputs.publish == 'true'
        id: tag
        run: |
          TAG_NAME="${{ steps.version.outputs.tag }}"
          LOCAL_SHA="$(git rev-list -n 1 "$TAG_NAME" 2>/dev/null || true)"
          REMOTE_SHA="$(git ls-remote --refs --tags origin "refs/tags/$TAG_NAME" | awk '{print $1}')"

          if [ -n "$LOCAL_SHA" ] || [ -n "$REMOTE_SHA" ]; then
            EXISTING_SHA="$REMOTE_SHA"
            if [ -z "$EXISTING_SHA" ]; then
              EXISTING_SHA="$LOCAL_SHA"
            fi

            if [ "$EXISTING_SHA" = "${GITHUB_SHA}" ]; then
              echo "Tag $TAG_NAME already points to ${GITHUB_SHA}. Skipping duplicate release."
              echo "publish=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "::error::Tag $TAG_NAME already exists at $EXISTING_SHA, expected ${GITHUB_SHA}."
            exit 1
          fi

          echo "publish=true" >> "$GITHUB_OUTPUT"

      - name: Create and push release tag
        if: steps.range.outputs.publish == 'true' && steps.tag.outputs.publish == 'true'
        run: |
          TAG_NAME="${{ steps.version.outputs.tag }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG_NAME" "${GITHUB_SHA}" -m "Release $TAG_NAME"
          git push origin "refs/tags/$TAG_NAME"

      - name: Create release from synchronized master commit
        if: steps.range.outputs.publish == 'true' && steps.tag.outputs.publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ steps.version.outputs.tag }}"
          generate_release_notes: true
          name: "Release ${{ steps.version.outputs.tag }}"
          body: |
            Release version: **${{ steps.version.outputs.version }}**
            Release source: master commit `${{ github.sha }}`
          target_commitish: "${{ github.sha }}"
