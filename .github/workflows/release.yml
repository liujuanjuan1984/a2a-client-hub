name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: version
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          RELEASE_VERSION="${TAG_NAME#v}"
          echo "version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Sync release version metadata
        run: |
          python3 scripts/sync_release_version.py --version "${{ steps.version.outputs.version }}" --write
          python3 scripts/sync_release_version.py --version "${{ steps.version.outputs.version }}" --check
          if git diff --quiet backend/pyproject.toml frontend/package.json frontend/app.json frontend/package-lock.json VERSION; then
            echo "No repository metadata changes required."
          else
            echo "Synchronized metadata files for release version ${{ steps.version.outputs.version }}."
            echo "The synchronized files are derived from tag ${{ steps.version.outputs.tag }} for release traceability."
          fi

      - name: Create release from tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ steps.version.outputs.tag }}"
          generate_release_notes: true
          name: "Release ${{ steps.version.outputs.tag }}"
          body: |
            Release version: **${{ steps.version.outputs.version }}**
            Release source: pushed tag `${{ steps.version.outputs.tag }}`
          # files:
          #   - backend/dist/*.whl
          #   - frontend/build/*.apk
