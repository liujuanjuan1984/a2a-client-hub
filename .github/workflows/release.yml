name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: version
        run: |
          RELEASE_VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches unified VERSION
        run: |
          VERSION_FILE_VALUE="$(cat VERSION)"
          if [ "${{ steps.version.outputs.version }}" != "$VERSION_FILE_VALUE" ]; then
            echo "::error::Release version ${VERSION_FILE_VALUE} required by VERSION file, but tag is v${{ steps.version.outputs.version }}."
            exit 1
          fi

      - name: Verify metadata files match release version
        run: |
          python3 scripts/sync_release_version.py --version "${{ steps.version.outputs.version }}" --check

      - name: Create release from tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ github.ref_name }}"
          generate_release_notes: true
          name: "v${{ steps.version.outputs.version }} / release"
          body: |
            Release version: **${{ steps.version.outputs.version }}**

            Unified version source: `VERSION`
          fail_on_unmatched_files: true
          # files:
          #   - backend/dist/*.whl
          #   - frontend/build/*.apk
