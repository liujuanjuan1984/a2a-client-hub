name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pull-requests: write

jobs:
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: version
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          RELEASE_VERSION="${TAG_NAME#v}"
          echo "version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Sync release version metadata
        id: sync
        run: |
          python3 scripts/sync_release_version.py --version "${{ steps.version.outputs.version }}" --write
          python3 scripts/sync_release_version.py --version "${{ steps.version.outputs.version }}" --check
          if git diff --quiet backend/pyproject.toml frontend/package.json frontend/app.json frontend/package-lock.json VERSION; then
            echo "No repository metadata changes required."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Synchronized metadata files for release version ${{ steps.version.outputs.version }}."
            echo "The synchronized files are derived from tag ${{ steps.version.outputs.tag }} for release traceability."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release from tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ steps.version.outputs.tag }}"
          generate_release_notes: true
          name: "Release ${{ steps.version.outputs.tag }}"
          body: |
            Release version: **${{ steps.version.outputs.version }}**
            Release source: pushed tag `${{ steps.version.outputs.tag }}`
          # files:
          #   - backend/dist/*.whl
          #   - frontend/build/*.apk

      - name: Create version sync pull request
        if: steps.sync.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          title: "chore(release): sync version metadata for ${{ steps.version.outputs.version }} (#586)"
          body: |
            ## 变更说明
            本 PR 由发布流水线自动发起，用于将仓库内版本元数据同步为标签版本。

            ### 来源
            - Tag: `${{ steps.version.outputs.tag }}`
            - 目标版本: `${{ steps.version.outputs.version }}`
            - 自动化: `.github/workflows/release.yml`

            ### 同步文件
            - `VERSION`
            - `backend/pyproject.toml`
            - `frontend/package.json`
            - `frontend/app.json`
            - `frontend/package-lock.json`

            ### 关联
            - Closes: #586
            - Related: #440
          branch: "release/version-${{ steps.version.outputs.version }}"
          base: master
          commit-message: "chore(release): sync version metadata for ${{ steps.version.outputs.version }} (#586)"
          delete-branch: true
          labels: |
            release
          add-paths: |
            VERSION
            backend/pyproject.toml
            frontend/package.json
            frontend/app.json
            frontend/package-lock.json
