name: CI

on:
  pull_request:
    branches:
      - master
      - main
  push:
    branches:
      - master

jobs:
  backend:
    name: Backend Checks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Install backend dependencies
        run: uv sync --extra dev --locked

      - name: Run backend black check (pre-commit)
        run: uv run pre-commit run black --all-files --config ../.pre-commit-config.yaml

      - name: Run backend isort check (pre-commit)
        run: uv run pre-commit run isort --all-files --config ../.pre-commit-config.yaml

      - name: Run backend ruff check (pre-commit)
        run: uv run pre-commit run ruff --all-files --config ../.pre-commit-config.yaml

      - name: Run backend detect-secrets hook (pre-commit)
        run: uv run pre-commit run detect-secrets --all-files --config ../.pre-commit-config.yaml

      - name: Run backend shellcheck hook (pre-commit)
        run: uv run pre-commit run shellcheck --all-files --config ../.pre-commit-config.yaml

      - name: Run backend bash syntax check hook (pre-commit)
        run: uv run pre-commit run bash-syntax-check --all-files --config ../.pre-commit-config.yaml

      - name: Fetch base branch for mypy diff
        if: github.event_name == 'pull_request'
        run: git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"

      - name: Run backend mypy check (changed files)
        run: uv run bash scripts/mypy_changed.sh

      - name: Run backend tests
        run: uv run pytest --cov=app --cov-report=term-missing --cov-fail-under=30

      - name: Export backend runtime requirements for audit
        run: >
          uv export --format requirements.txt --no-dev --locked --no-emit-project
          --output-file /tmp/backend-runtime-requirements.txt >/dev/null

      - name: Run backend runtime dependency audit
        run: uv run pip-audit --requirement /tmp/backend-runtime-requirements.txt

  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm install

      - name: Run frontend lint
        run: npm run lint

      - name: Run frontend type checks
        run: npm run check-types
        env:
          NODE_OPTIONS: --max-old-space-size=1024

      - name: Run frontend tests
        run: npm test -- --coverage --maxWorkers=25%
