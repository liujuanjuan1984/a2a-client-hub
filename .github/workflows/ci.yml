name: CI

on:
  pull_request:
    branches:
      - master
      - main
  push:
    branches:
      - master

jobs:
  backend:
    name: Backend Checks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Install backend dependencies
        run: uv sync --extra dev --locked

      - name: Run backend black check (pre-commit)
        run: uv run pre-commit run black --all-files --config ../.pre-commit-config.yaml

      - name: Run backend isort check (pre-commit)
        run: uv run pre-commit run isort --all-files --config ../.pre-commit-config.yaml

      - name: Run backend ruff check (pre-commit)
        run: uv run pre-commit run ruff --all-files --config ../.pre-commit-config.yaml

      - name: Run backend tests
        run: uv run pytest

  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm install

      - name: Run frontend lint
        run: npm run lint

      - name: Run frontend type checks
        run: npm run check-types
        env:
          NODE_OPTIONS: --max-old-space-size=1024

      - name: Run frontend tests
        run: npm test -- --runInBand
