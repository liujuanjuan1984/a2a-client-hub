repos:
  # Python code formatting
  - repo: https://github.com/psf/black
    rev: 26.1.0
    hooks:
      - id: black
        args: [--line-length=88]
        exclude: ^(backend/alembic/versions/|scripts/)

  # Import sorting
  - repo: https://github.com/pycqa/isort
    rev: 8.0.0
    hooks:
      - id: isort
        args: [--profile=black, --line-length=88]
        exclude: ^(backend/alembic/versions/)

  # Remove unused imports and variables
  - repo: https://github.com/pycqa/autoflake
    rev: v2.3.3
    hooks:
      - id: autoflake
        args:
          - --in-place
          - --remove-all-unused-imports
          - --remove-unused-variables
          - --recursive
        exclude: ^(backend/alembic/versions/|__pycache__/)

  # Fast Python linting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.2
    hooks:
      - id: ruff
        args: [--fix]
        exclude: ^(backend/alembic/versions/|__pycache__/|scripts/)

  # Type checking (temporarily disabled for gradual adoption)
  # - repo: https://github.com/pre-commit/mirrors-mypy
  #   rev: v1.8.0
  #   hooks:
  #     - id: mypy
  #       args: [--config-file=backend/pyproject.toml]
  #       exclude: ^(backend/alembic/versions/|scripts/|backend/tests/)
  #       additional_dependencies:
  #         - types-requests
  #         - types-PyYAML
  #         - types-python-jose
  #         - types-passlib
  #         - types-beautifulsoup4
  #         - types-sqlalchemy

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: debug-statements

  # Secret scanning
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: ^(frontend/package-lock\.json|backend/uv\.lock)$

  # Shell script static checks
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        args: [--severity=error]
        files: ^(backend/scripts|frontend/scripts|scripts)/.*\.sh$

  # Local checks
  - repo: local
    hooks:
      - id: backend-mypy-changed
        name: backend mypy (changed files only)
        entry: bash backend/scripts/mypy_changed.sh
        language: system
        files: ^backend/.*\.py$

      - id: bash-syntax-check
        name: bash -n syntax check
        entry: bash -n
        language: system
        files: ^(backend/scripts|frontend/scripts|scripts)/.*\.sh$

      # Frontend checks (run only when frontend/ files are changed)
      - id: frontend-eslint
        name: frontend eslint
        entry: bash -lc 'cd frontend && npm run lint'
        language: system
        pass_filenames: false
        files: ^frontend/.*\.(ts|tsx|js|jsx)$

      - id: frontend-tsc
        name: frontend typescript
        entry: bash -lc 'cd frontend && npm run check-types'
        language: system
        pass_filenames: false
        files: ^frontend/(package\.json|package-lock\.json|tsconfig\.json|eslint\.config\.js|app\.json|babel\.config\.js|metro\.config\.js|.*\.(ts|tsx|js|jsx|json|css))$
